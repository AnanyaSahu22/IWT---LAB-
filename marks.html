<html>
<head>
<title>Marks</title>
<script language="JavaScript">
let a=parseFloat(prompt("Enter the marks"));
if(a>=90)
document.write("Grade is A");
else if(a>=75)
document.write("Grade is B");
else if(a>=50)
document.write("Grade is C");
else if(a<=50)
document.write("Grade is Fail");
</script>
</head>
</html>
