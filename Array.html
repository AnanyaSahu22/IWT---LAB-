<html>
<head>
<title>Array</title>
<script language="Javascript">
var a=new Array(3,66,12,70,5);
var i,sum=0;
for(i=0;i<5;i++)
{
sum=sum+a[i];
avg=sum/5;
}
document.write("Sum="+sum+"<br>");
document.write("Average is"+avg+"<br>");
largest=a[0];
for(i=0;i<5;i++)
if(a[i]>largest)
{
largest=a[i];
}
document.write("Largest="+largest+"<br>");
smallest=a[0];
for(i=0;i<5;i++)
if(a[i]<smallest)
{
smallest=a[i];
}
document.write("Smallest="+smallest+"<br>");
</script>
</head>
</html>
